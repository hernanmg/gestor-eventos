# ─── Nginx config para admin-portal ───────────────────────────────────────────
# Reemplazar TU_DOMINIO antes de usar:
#   sed -i 's/TU_DOMINIO/midominio.com/g' /etc/nginx/sites-available/admin-portal
# ──────────────────────────────────────────────────────────────────────────────

# Gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/javascript application/javascript application/json
           application/xml image/svg+xml;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name TU_DOMINIO;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name TU_DOMINIO;

    # Certificados Let's Encrypt (generados por certbot)
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"             always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    root /var/www/admin-portal/frontend/dist;
    index index.html;

    # Assets con hash en el nombre → cache 1 año
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html → sin cache para que el browser siempre traiga la versión nueva
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback: cualquier ruta desconocida devuelve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Timeouts extendidos para exports PDF/Excel via Puppeteer
        proxy_read_timeout    120s;
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;

        # Tamaño máximo para importación de archivos Excel
        client_max_body_size 15M;

        # Headers de proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
